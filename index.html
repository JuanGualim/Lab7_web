<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Snake con React</title>

  <!-- React y ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- Babel para JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: #1b1b1b;
        padding: 20px 30px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        text-align: center;
    }

    h1 {
        margin-bottom: 10px;
    }

    .board {
        display: grid;
        margin: 15px auto;
        background: #111;
        border-radius: 10px;
        overflow: hidden;
    }

    .cell {
        width: 22px;
        height: 22px;
        border: 1px solid #222;
    }

    .snake {
        background: linear-gradient(135deg, #32cd32, #228b22);
        border-radius: 4px;
    }

    .food {
        background: radial-gradient(circle, red 40%, darkred);
        border-radius: 50%;
    }

    .info {
        margin-top: 10px;
    }

    button {
        padding: 10px 18px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        background: #ff4757;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #ff6b81;
    }

    .game-over {
        color: #ff4757;
        margin-bottom: 10px;
    }

  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const BOARD_SIZE = 20;

    function getRamdomPosition() {
        return {
            x: Math.floor(Math.random() * BOARD_SIZE),
            y: Math.floor(Math.random() * BOARD_SIZE)
        }
    }

    function getInitialSnake() {
        return [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];
    }


    // Componente principal
    function Game() {

        const [snake, setSnake] = useState(getInitialSnake());
        const [direction, setDirection] = useState('RIGHT');
        const [food, setFood] = useState(getRamdomPosition());
        const [score, setScore] = useState(0);
        const [gameOver, setGameOver] = useState(false);
        const [speed, setSpeed] = useState(200);
        
        // Loop del juego
        useEffect(() => {
            
            if (gameOver) return;

            const interval = setInterval(() => {
                moveSnake();
            }, speed);

            return () => clearInterval(interval);
        }, [snake, direction, food, gameOver, speed]);

        // Control de teclado
        useEffect(() => {
            function handleKeyDown(e) {
                switch (e.key) {
                    case 'ArrowUp':
                        if (direction !== 'DOWN') setDirection('UP');
                        break;
                    case 'ArrowDown':
                        if (direction !== 'UP') setDirection('DOWN');
                        break;
                    case 'ArrowLeft':
                        if (direction !== 'RIGHT') setDirection('LEFT');
                        break;
                    case 'ArrowRight':
                        if (direction !== 'LEFT') setDirection('RIGHT');
                        break;
                    default:
                        break;
                }
            }
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
        }, [direction]);

        function resetGame() {
            setSnake(getInitialSnake());
            setDirection('RIGHT');
            setFood(getRamdomPosition());
            setScore(0);
            setGameOver(false);
            setSpeed(200);
        }

        function checkCollision(head, snakeBody){
            // Verificar colisión con paredes
            if (
                head.x < 0 ||
                head.x >= BOARD_SIZE ||
                head.y < 0 ||
                head.y >= BOARD_SIZE
            ) {
                return true;
            }

            return snakeBody.some(segment => segment.x === head.x && segment.y === head.y);
        }

        function moveSnake () {
            const head = snake[0];
            let newHead;

            switch (direction) {
                case 'UP':
                    newHead = { x: head.x, y: head.y - 1 };
                    break;
                case 'DOWN':
                    newHead = { x: head.x, y: head.y + 1 };
                    break;
                case 'LEFT':
                    newHead = { x: head.x - 1, y: head.y };
                    break;
                case 'RIGHT':
                    newHead = { x: head.x + 1, y: head.y };
                    break;
                default:
                    return;
            }

            if (checkCollision(newHead, snake)) {
                setGameOver(true);
                return;
            }

            // Verificar si serpiente come
            const isEating = newHead.x === food.x && newHead.y === food.y;

            let newSnake;

            if (isEating) {
                newSnake = [newHead, ...snake];
                setFood(getRamdomPosition());
                setScore(score + 1);
                setSpeed(prev => Math.max(50, prev - 10));
            } else {
                newSnake = [newHead, ...snake.slice(0, -1)];
            }

            setSnake(newSnake);
        }

        return (
            <div className="container">
                <h1>🐍 Snake Game</h1>

                {gameOver && (
                    <div className="gameover">
                    <h2>Game Over</h2>
                    <button onClick={resetGame}>Reiniciar</button>
                    </div>
                )}

                <Score score={score} speed={speed} />
                <Board snake={snake} food={food} />
            </div>
      );
    }

    // Tablero
    function Board({ snake, food }) {
        const cells = [];
        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                const isSnake = snake.some(segment => segment.x === x && segment.y === y);
                const isFood = food.x === x && food.y === y;

                let className = 'cell';
                if (isSnake) className += ' snake';
                else if (isFood) className += ' food';

                cells.push(
                    <div
                        key={`${x}-${y}`}
                        className= {className}
                    ></div>
                );
            }
        }
        return (
            <div 
                className="board"
                style = {{
                    gridTemplateColumns: `repeat(${BOARD_SIZE}, 20px)`
                }}
            >
                {cells}
            
            </div>
        );
    }


    // Puntaje
    function Score({ score, speed }) {
      return (
        <div>
          <h2>Puntaje: {score}</h2>
          <p>Velocidad: {speed}</p>
        </div>
      );
    }

    // Render
    ReactDOM.createRoot(document.getElementById('root')).render(<Game />);
  </script>
</body>
</html>
