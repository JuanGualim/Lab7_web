<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Snake con React</title>

  <!-- React y ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- Babel para JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #111;
      color: white;
    }

    .board {
      display: grid;
      margin: 20px auto;
      background-color: #222;
    }

    .cell {
      width: 20px;
      height: 20px;
      border: 1px solid #333;
    }

    .snake {
      background-color: limegreen;
    }

    .food {
      background-color: red;
    }

    button {
        padding: 10px 15px;
        margin-top: 10px;
        cursor: pointer;
    }

  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const BOARD_SIZE = 20;

    function getRamdomPosition() {
        return {
            x: Math.floor(Math.random() * BOARD_SIZE),
            y: Math.floor(Math.random() * BOARD_SIZE)
        }
    }

    function getInitialSnake() {
        return [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];
    }


    // Componente principal
    function Game() {

        const [snake, setSnake] = useState(getInitialSnake());
        const [direction, setDirection] = useState('RIGHT');
        const [food, setFood] = useState(getRamdomPosition());
        const [score, setScore] = useState(0);
        const [gameOver, setGameOver] = useState(false);
        
        // Loop del juego
        useEffect(() => {
            
            if (gameOver) return;

            const interval = setInterval(() => {
                moveSnake();
            }, 200);

            return () => clearInterval(interval);
        }, [snake, direction, food, gameOver]);

        // Control de teclado
        useEffect(() => {
            function handleKeyDown(e) {
                switch (e.key) {
                    case 'ArrowUp':
                        if (direction !== 'DOWN') setDirection('UP');
                        break;
                    case 'ArrowDown':
                        if (direction !== 'UP') setDirection('DOWN');
                        break;
                    case 'ArrowLeft':
                        if (direction !== 'RIGHT') setDirection('LEFT');
                        break;
                    case 'ArrowRight':
                        if (direction !== 'LEFT') setDirection('RIGHT');
                        break;
                    default:
                        break;
                }
            }
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
        }, [direction]);

        function resetGame() {
            setSnake(getInitialSnake());
            setDirection('RIGHT');
            setFood(getRamdomPosition());
            setScore(0);
            setGameOver(false);
        }

        function checkCollision(head, snakeBody){
            // Verificar colisión con paredes
            if (
                head.x < 0 ||
                head.x >= BOARD_SIZE ||
                head.y < 0 ||
                head.y >= BOARD_SIZE
            ) {
                return true;
            }

            return snakeBody.some(segment => segment.x === head.x && segment.y === head.y);
        }

        function moveSnake () {
            const head = snake[0];
            let newHead;

            switch (direction) {
                case 'UP':
                    newHead = { x: head.x, y: head.y - 1 };
                    break;
                case 'DOWN':
                    newHead = { x: head.x, y: head.y + 1 };
                    break;
                case 'LEFT':
                    newHead = { x: head.x - 1, y: head.y };
                    break;
                case 'RIGHT':
                    newHead = { x: head.x + 1, y: head.y };
                    break;
                default:
                    return;
            }

            if (checkCollision(newHead, snake)) {
                setGameOver(true);
                return;
            }

            // Verificar si serpiente come
            const isEating = newHead.x === food.x && newHead.y === food.y;

            let newSnake;

            if (isEating) {
                newSnake = [newHead, ...snake];
                setFood(getRamdomPosition());
                setScore(score + 1);
            } else {
                newSnake = [newHead, ...snake.slice(0, -1)];
            }

            setSnake(newSnake);
        }

        return (
            <div>
                <h1>Snake Game</h1>
                {gameOver && (
                    <div>
                        <h2>💀 Game Over!</h2>
                        <button onClick={resetGame}>Reiniciar</button>
                    </div>
                )}
                <Score score={score} />
                <Board snake={snake} food={food} />
            </div>
        );
    }

    // Tablero
    function Board({ snake, food }) {
        const cells = [];
        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                const isSnake = snake.some(segment => segment.x === x && segment.y === y);
                const isFood = food.x === x && food.y === y;

                let className = 'cell';
                if (isSnake) className += ' snake';
                else if (isFood) className += ' food';

                cells.push(
                    <div
                        key={`${x}-${y}`}
                        className= {className}
                    ></div>
                );
            }
        }
        return (
            <div 
                className="board"
                style = {{
                    gridTemplateColumns: `repeat(${BOARD_SIZE}, 20px)`
                }}
            >
                {cells}
            
            </div>
        );
    }


    // Puntaje
    function Score({ score }) {
      return <h2>Puntaje: {score}</h2>;
    }

    // Render
    ReactDOM.createRoot(document.getElementById('root')).render(<Game />);
  </script>
</body>
</html>
